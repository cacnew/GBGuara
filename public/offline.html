<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NexusDojo — Offline</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #0b0b0f;
        color: #f4f4f5;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .wrap {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 24px;
        text-align: center;
      }
      .dot {
        width: 48px;
        height: 48px;
        border-radius: 999px;
        background: #c8102e;
      }
      h1 {
        font-size: 1.25rem;
        margin: 0;
      }
      p {
        margin: 0;
        color: #a1a1aa;
        max-width: 320px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="dot"></div>
      <h1>Você está offline</h1>
      <p>Conecte-se à internet para acessar o NexusDojo. Seus dados estão seguros na nuvem.</p>
    </div>
  </body>
</html>
